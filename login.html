<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能政务助手 - 登录/注册</title>
    <link rel="stylesheet" href="layui/css/layui.css">
    <style>
        :root {
            /* 政务蓝配色体系 */
            --gov-primary: #1890ff;
            --gov-primary-dark: #096dd9;
            --gov-bg: #f0f2f5;
            --gov-text: #000000d9;
            --gov-text-secondary: #00000073;
            --gov-white: #ffffff;
            --card-shadow: 0 10px 40px -10px rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
            background-color: var(--gov-bg);
            /* 添加细腻的背景纹理 */
            background-image: 
                radial-gradient(at 10% 10%, rgba(24, 144, 255, 0.08) 0px, transparent 50%),
                radial-gradient(at 90% 90%, rgba(24, 144, 255, 0.08) 0px, transparent 50%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-container {
            width: 960px;
            max-width: 94%;
            height: 666px;
            background: var(--gov-white);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            display: flex;
            overflow: hidden;
            position: relative;
        }

        /* 左侧品牌区：设计更具政务威严感 */
        .brand-section {
            flex: 0 0 420px;
            background: linear-gradient(135deg, #001529 0%, #003a8c 100%);
            color: var(--gov-white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 40px;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* 装饰背景圆环 */
        .brand-section::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.03);
            top: -50px;
            left: -50px;
            pointer-events: none;
        }

        .brand-logo i {
            font-size: 72px;
            margin-bottom: 24px;
            color: #69c0ff; /* 亮蓝点缀 */
        }

        .brand-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            letter-spacing: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .brand-slogan {
            font-size: 16px;
            opacity: 0.85;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* 右侧表单区 */
        .form-section {
            flex: 1;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            /* 新增：防止内容被挤压 */
            min-height: 0; /* 解决flex子元素高度溢出问题 */
            padding-top: 80px; /* 若顶部空间不足，增加上内边距 */
        }

        .form-title {
            font-size: 24px;
            font-weight: 500;
            color: var(--gov-text);
            margin-bottom: 32px;
            position: relative;
            padding-left: 12px;
        }

        .form-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 6px;
            bottom: 6px;
            width: 4px;
            background: var(--gov-primary);
            border-radius: 2px;
        }

        /* 输入框组样式优化 */
        .input-group {
            margin-bottom: 24px;
            position: relative;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--gov-text);
        }

        .custom-input {
            width: 100%;
            height: 40px;
            padding: 8px 12px;
            padding-right: 40px;
            font-size: 14px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            box-sizing: border-box;
            transition: all 0.3s;
            outline: none;
            color: var(--gov-text);
        }

        .custom-input:hover {
            border-color: #40a9ff;
        }

        .custom-input:focus {
            border-color: var(--gov-primary);
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        /* 输入框图标 */
        .input-icon-right {
            position: absolute;
            right: 12px;
            top: 38px;
            color: var(--gov-text-secondary);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.3s;
        }
        .input-icon-right:hover {
            color: var(--gov-primary);
        }

        /* 验证码按钮优化 */
        .captcha-btn {
            position: absolute;
            right: 1px;
            top: 30px;
            height: 38px;
            border: none;
            background: transparent;
            color: var(--gov-primary);
            cursor: pointer;
            padding: 0 15px;
            font-size: 14px;
            transition: all 0.3s;
        }
        .captcha-btn:hover {
            background-color: #f0f5ff;
        }
        .captcha-btn:disabled {
            color: #ccc;
            background: transparent;
            cursor: not-allowed;
        }

        /* 错误提示 */
        .error-msg {
            color: #ff4d4f;
            font-size: 12px;
            margin-top: 5px;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 选项行 */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 30px;
            color: var(--gov-text-secondary);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        .checkbox-wrapper input {
            margin-right: 8px;
            accent-color: var(--gov-primary);
        }

        .link-text {
            color: var(--gov-primary);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
        }
        .link-text:hover {
            color: var(--gov-primary-dark);
            text-decoration: underline;
        }

        /* 提交按钮优化 */
        .submit-btn {
            width: 100%;
            height: 44px;
            background-color: var(--gov-primary);
            color: var(--gov-white);
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 0 rgba(0,0,0,0.045);
        }
        .submit-btn:hover {
            background-color: var(--gov-primary-dark);
            box-shadow: 0 4px 10px rgba(24, 144, 255, 0.3);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .switch-box {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: var(--gov-text-secondary);
        }

        /* 动画过渡 */
        .fade-in {
            animation: fadeInForm 0.4s ease-out forwards;
        }
        @keyframes fadeInForm {
            from { opacity: 0; transform: translateX(10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 响应式调整 */
        @media screen and (max-width: 768px) {
            .auth-container {
                flex-direction: column;
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
            .brand-section {
                flex: 0 0 160px;
                padding: 20px;
            }
            .brand-logo i { font-size: 48px; margin-bottom: 10px; }
            .brand-title { font-size: 22px; }
            .form-section {
                padding: 30px 20px;
            }
        }
    </style>
    <script>
        // --- 系统核心逻辑区域 (保持原逻辑不变) ---

        // 日志记录系统
        function recordLog(type, detail) {
            const logs = JSON.parse(localStorage.getItem('gov_logs') || '[]');
            const user = JSON.parse(localStorage.getItem('gov_current_user') || '{}');

            logs.unshift({
                time: new Date().toLocaleString(),
                operator: user.username || '访客',
                type: type,
                ip: '192.168.1.' + Math.floor(Math.random() * 255),
                detail: detail
            });

            if(logs.length > 50) logs.pop();
            localStorage.setItem('gov_logs', JSON.stringify(logs));
        }

        // 主题配置应用
        (function(){
            const config = JSON.parse(localStorage.getItem('gov_ui_config') || '{}');
            if(config.theme === 'gray') {
                const style = document.createElement('style');
                style.innerHTML = `
                    :root {
                        --gov-primary: #595959 !important;
                        --gov-primary-dark: #262626 !important;
                    }
                    .brand-section { background: #434343 !important; }
                `;
                document.head.appendChild(style);
            }
            if(config.fontsize === 'large') document.documentElement.style.fontSize = '18px';
        })();
    </script>
</head>
<body>

<div class="auth-container">
    <div class="brand-section">
        <div class="brand-logo"><i class="layui-icon layui-icon-template-1"></i></div>
        <div class="brand-title">智能政务助手</div>
        <div class="brand-slogan">数智赋能政务 · 便民服务零距离</div>
    </div>

    <div class="form-section">
        <div id="login-box" class="fade-in">
            <div class="form-title">用户登录</div>
            <form class="layui-form" id="form-login" onsubmit="return false;">
                <div class="input-group">
                    <label class="input-label">手机号码</label>
                    <input type="text" id="login-phone" class="custom-input" placeholder="请输入11位手机号码" maxlength="11">
                    <div class="error-msg" id="err-login-phone">请输入正确的手机号码格式</div>
                </div>
                <div class="input-group">
                    <label class="input-label">登录密码</label>
                    <input type="password" id="login-pwd" class="custom-input" placeholder="请输入密码">
                    <i class="layui-icon layui-icon-eye-invisible input-icon-right" onclick="togglePwd('login-pwd', this)"></i>
                    <div class="error-msg" id="err-login-pwd">密码不能为空</div>
                </div>
                <div class="form-options">
                    <label class="checkbox-wrapper"><input type="checkbox" checked> 记住密码</label>
                    <a href="javascript:;" class="link-text" onclick="layer.msg('请联系管理员重置密码')">忘记密码？</a>
                </div>
                <button class="submit-btn" onclick="handleLogin()">登 录</button>
                <div class="switch-box">
                    还未注册？ <a href="javascript:;" class="link-text" onclick="switchView('register')">立即注册</a>
                </div>
            </form>
        </div>

        <div id="register-box" style="display: none;" class="fade-in">
            <div class="form-title">新用户注册</div>
            <form class="layui-form" id="form-register" onsubmit="return false;">
                <div class="input-group">
                    <label class="input-label">用户名</label>
                    <input type="text" id="reg-name" class="custom-input" placeholder="请输入您的真实姓名">
                    <div class="error-msg" id="err-reg-name">用户名不能为空</div>
                </div>
                <div class="input-group">
                    <label class="input-label">手机号码</label>
                    <input type="text" id="reg-phone" class="custom-input" placeholder="请输入11位手机号码" maxlength="11" style="padding-right: 110px;">
                    <button type="button" class="captcha-btn" id="btn-captcha" onclick="sendCaptcha()">获取验证码</button>
                    <div class="error-msg" id="err-reg-phone">请输入正确的手机号码格式</div>
                </div>
                <div class="input-group">
                    <label class="input-label">设置密码</label>
                    <input type="password" id="reg-pwd" class="custom-input" placeholder="6-16位字符，包含字母和数字">
                    <i class="layui-icon layui-icon-eye-invisible input-icon-right" onclick="togglePwd('reg-pwd', this)"></i>
                    <div class="error-msg" id="err-reg-pwd">密码格式不符合要求</div>
                </div>
                <div class="input-group">
                    <label class="input-label">确认密码</label>
                    <input type="password" id="reg-pwd-confirm" class="custom-input" placeholder="请再次输入密码">
                    <div class="error-msg" id="err-reg-confirm">两次输入的密码不一致</div>
                </div>
                <div class="input-group">
                    <label class="input-label">验证码</label>
                    <input type="text" id="reg-captcha" placeholder="请输入验证码: " class="custom-input">
                    <div class="error-msg" id="err-reg-captcha">验证码错误</div>
                </div>
                <button class="submit-btn" onclick="handleRegister()">注 册</button>
                <div class="switch-box">
                    已有账号？ <a href="javascript:;" class="link-text" onclick="switchView('login')">立即登录</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="layui/layui.js"></script>
<script>
    // --- 业务逻辑区域 (严格保持原功能逻辑) ---

    // 模拟数据库初始化
    function initMockDB() {
        if (!localStorage.getItem('gov_user_list')) {
            const defaultUsers = [
                {id: 'U1001', username: '系统管理员', phone: '13899999999', password: "qazwsx123", regTime: '2023-01-01', role: 'admin', status: 1},
                {id: 'U1002', username: '李市民', phone: '13800008888', password: "qazwsx123", regTime: '2023-10-12', role: 'user', status: 1}
            ];
            localStorage.setItem('gov_user_list', JSON.stringify(defaultUsers));

            const feedbacks = [
                {id: 'FB1001', time: '2023-10-24 10:00', type: '系统故障', content: '社保系统无法登陆', status: 0, result: ''},
                {id: 'FB1002', time: '2023-10-23 15:30', type: '服务投诉', content: '窗口排队太久', status: 1, result: '正在核查监控'}
            ];
            localStorage.setItem('gov_feedbacks', JSON.stringify(feedbacks));
        }
    }
    initMockDB();

    layui.use(['layer'], function(){
        const layer = layui.layer;

        // 辅助函数
        const $id = (id) => document.getElementById(id);
        const REGEX_PHONE = /^1[3-9]\d{9}$/;

        // 错误信息开关
        const toggleErr = (id, condition) => {
            const el = $id(id);
            if(el) {
                el.style.display = condition ? 'block' : 'none';
            }
            return condition;
        };

        window.switchView = function(view) {
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
            const isReg = view === 'register';
            const loginBox = $id('login-box');
            const regBox = $id('register-box');
            
            if(isReg) {
                loginBox.style.display = 'none';
                regBox.style.display = 'block';
            } else {
                regBox.style.display = 'none';
                loginBox.style.display = 'block';
            }
            document.title = "智能政务助手 - " + (isReg ? "注册" : "登录");
        };

        window.togglePwd = function(inputId, iconEl) {
            const input = $id(inputId);
            const isPwd = input.type === 'password';
            input.type = isPwd ? 'text' : 'password';
            iconEl.classList.toggle('layui-icon-eye-invisible', !isPwd);
            iconEl.classList.toggle('layui-icon-eye', isPwd);
        };

        window.sendCaptcha = function() {
            const phone = $id('reg-phone').value;
            if(toggleErr('err-reg-phone', !REGEX_PHONE.test(phone))) return;

            const btn = $id('btn-captcha');
            let count = 60;
            btn.disabled = true;
            btn.innerText = count + 's后重发';

            layer.msg('验证码已发送 (测试码:8916)', {icon: 1, time: 2000});

            const timer = setInterval(() => {
                count--;
                btn.innerText = count + 's后重发';
                if(count <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.innerText = '获取验证码';
                }
            }, 1000);
        };

        window.handleLogin = function() {
            const phone = $id('login-phone').value;
            const pwd = $id('login-pwd').value;

            // 验证
            let hasError = toggleErr('err-login-phone', !REGEX_PHONE.test(phone));
            hasError = toggleErr('err-login-pwd', !pwd) || hasError;

            if(hasError) return;

            const loading = layer.load(2); // 2号加载风格
            setTimeout(() => {
                layer.close(loading);
                const userList = JSON.parse(localStorage.getItem('gov_user_list') || '[]');
                const targetUser = userList.find(u => u.phone === phone && u.password === pwd);

                if(targetUser) {
                    if(targetUser.status === 0) {
                        layer.msg('该账号已被禁用，请联系管理员', {icon: 2});
                        return;
                    }
                    localStorage.setItem('gov_current_user', JSON.stringify(targetUser));
                    if(typeof recordLog === 'function') recordLog('LOGIN', targetUser.username + ' 登录成功');

                    layer.msg('登录成功', {icon: 1, time: 1000}, function(){
                        window.location.href = (targetUser.role === 'admin') ? 'admin.html' : 'index.html';
                    });
                } else {
                    layer.msg('账号或密码错误', {icon: 2});
                }
            }, 1000);
        };

        window.handleRegister = function() {
            const name = $id('reg-name').value;
            const phone = $id('reg-phone').value;
            const pwd = $id('reg-pwd').value;
            const pwdConfirm = $id('reg-pwd-confirm').value;
            const captcha = $id('reg-captcha').value;

            // 批量验证
            let hasError = toggleErr('err-reg-name', !name);
            hasError = toggleErr('err-reg-phone', !REGEX_PHONE.test(phone)) || hasError;
            hasError = toggleErr('err-reg-pwd', pwd.length < 6) || hasError;
            hasError = toggleErr('err-reg-confirm', pwd !== pwdConfirm) || hasError;
            hasError = toggleErr('err-reg-captcha', captcha !== '8916') || hasError;

            if(hasError) return;

            const loading = layer.load(2);
            setTimeout(() => {
                layer.close(loading);
                const userList = JSON.parse(localStorage.getItem('gov_user_list') || '[]');

                if(userList.find(u => u.phone === phone)) {
                    layer.msg('该手机号已被注册', {icon: 2});
                    return;
                }

                userList.push({
                    id: 'U' + new Date().getTime(),
                    username: name,
                    phone: phone,
                    password: pwd,
                    regTime: new Date().toLocaleDateString(),
                    role: 'user',
                    status: 1
                });
                localStorage.setItem('gov_user_list', JSON.stringify(userList));

                layer.msg('注册成功！请登录', {icon: 1, time: 2000}, function(){
                    switchView('login');
                    $id('login-phone').value = phone;
                });
            }, 1000);
        };
    });
</script>
</body>
</html>
