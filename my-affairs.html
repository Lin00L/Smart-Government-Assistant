<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的办件 - 智能政务助手</title>
    <link rel="stylesheet" href="layui/css/layui.css">
    <style>
        :root {
            /* 统一配色变量 */
            --gov-primary: #1890ff;
            --gov-primary-dark: #096dd9;
            --gov-bg: #f0f2f5;
            --gov-white: #ffffff;
            --text-main: #000000d9;
            --text-secondary: #00000073;
            --success-color: #52c41a;
            --warning-color: #fa8c16;
            --error-color: #ff4d4f;
            --card-shadow: 0 1px 2px -2px rgba(0,0,0,0.16), 0 3px 6px 0 rgba(0,0,0,0.12), 0 5px 12px 4px rgba(0,0,0,0.09);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--gov-bg);
            /* 背景纹理 */
            background-image: radial-gradient(#e6f7ff 1px, transparent 1px);
            background-size: 20px 20px;
            margin: 0; padding: 24px;
            color: var(--text-main);
        }

        /* 顶部导航 */
        .top-nav {
            height: 64px;
            background: linear-gradient(90deg, #001529 0%, #003a8c 100%);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; color: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            margin-bottom: 24px; border-radius: 4px;
        }
        .nav-title { font-size: 20px; font-weight: 600; display: flex; align-items: center; letter-spacing: 1px; }
        .nav-link {
            color: rgba(255,255,255,0.85); text-decoration: none; font-size: 14px;
            display: flex; align-items: center; transition: all 0.3s;
        }
        .nav-link:hover { color: #fff; opacity: 1; transform: translateX(-2px); }

        /* 面包屑导航 */
        .breadcrumb-container {
            background: #fff; padding: 16px 24px; margin-bottom: 24px;
            border-radius: 4px; border: 1px solid #f0f0f0;
            display: flex; align-items: center;
        }
        .layui-breadcrumb a { color: var(--text-secondary) !important; }
        .layui-breadcrumb a:hover { color: var(--gov-primary) !important; }
        .layui-breadcrumb cite { color: var(--text-main); font-weight: 500; }

        /* 主卡片 */
        .main-card {
            max-width: 1100px; margin: 0 auto;
            background: #fff; padding: 32px;
            border-radius: 8px; box-shadow: var(--card-shadow);
            min-height: 500px;
            border: 1px solid #f0f0f0;
        }

        .header-bar {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #f0f0f0; padding-bottom: 20px; margin-bottom: 24px;
        }

        .page-title {
            font-size: 20px; font-weight: 600; color: #1f2937;
            display: flex; align-items: center;
        }
        .page-title::before {
            content: ''; display: inline-block; width: 4px; height: 20px;
            background: var(--gov-primary); margin-right: 12px; border-radius: 2px;
        }

        /* 表格优化 */
        .layui-table-view { border-radius: 4px; border-color: #f0f0f0; }
        .layui-table thead tr { background-color: #fafafa; }
        .layui-table-cell { height: auto; padding: 10px 15px; line-height: 24px; }

        /* 状态徽章优化 */
        .layui-badge { border-radius: 4px; padding: 4px 8px; font-size: 12px; border: 1px solid transparent; }
        .layui-bg-orange { background-color: #fff7e6 !important; color: #fa8c16 !important; border-color: #ffd591; }
        .layui-bg-green { background-color: #f6ffed !important; color: #52c41a !important; border-color: #b7eb8f; }
        .layui-bg-red { background-color: #fff1f0 !important; color: #ff4d4f !important; border-color: #ffa39e; } /* 驳回 */
        .layui-bg-gray { background-color: #f5f5f5 !important; color: rgba(0,0,0,0.45) !important; border-color: #d9d9d9; }

        /* 操作按钮优化 */
        .layui-btn-xs { height: 24px; line-height: 24px; padding: 0 8px; font-size: 12px; margin-right: 8px; border-radius: 2px; }
        .layui-btn-primary { border-color: #d9d9d9; color: var(--text-main); }
        .layui-btn-primary:hover { border-color: var(--gov-primary); color: var(--gov-primary); }
        .layui-btn-danger { background-color: #ff4d4f; }
        .layui-btn-warm { background-color: #fa8c16; }

        /* 评价弹窗优化 */
        .eval-star { font-size: 32px; margin: 0 4px; transition: transform 0.2s; }
        .eval-star:hover { transform: scale(1.2); }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-title">
        <i class="layui-icon layui-icon-template-1" style="margin-right: 12px; font-size: 24px; color: #69c0ff;"></i>智能政务助手
    </div>
    <div>
        <a href="index.html" class="nav-link">
            <i class="layui-icon layui-icon-return" style="margin-right: 6px;"></i> 返回首页
        </a>
    </div>
</div>

<div class="main-card">
    <div class="breadcrumb-container">
        <span class="layui-breadcrumb">
            <a href="index.html">首页</a>
            <a href="guide.html">服务指南</a>
            <a><cite>我的办件</cite></a>
        </span>
    </div>

    <div class="header-bar">
        <div class="page-title">我的办件记录</div>
    </div>

    <table class="layui-hide" id="myAppsTable" lay-filter="myAppsTable"></table>

    <script type="text/html" id="statusTpl">
        {{#  if(d.status === 0){ }}
            <span class="layui-badge layui-bg-orange">审核中</span>
        {{#  } else if(d.status === 1){ }}
            <span class="layui-badge layui-bg-green">已通过</span>
        {{#  } else { }}
            <span class="layui-badge layui-bg-red">已驳回</span>
        {{#  } }}
    </script>

    <script type="text/html" id="barDemo">
        <a class="layui-btn layui-btn-xs layui-btn-primary" lay-event="detail">详情</a>

        {{#  if(d.status === 0){ }}
            <a class="layui-btn layui-btn-xs layui-btn-danger" lay-event="withdraw">撤回</a>
        {{#  } }}

        {{#  if(d.status === 1 && !d.rating){ }}
            <a class="layui-btn layui-btn-xs layui-btn-warm" lay-event="evaluate">评价</a>
        {{#  } }}

        {{#  if(d.rating){ }}
            <span class="layui-badge layui-bg-gray">已评价</span>
        {{#  } }}
    </script>
</div>

<script src="layui/layui.js"></script>
<script src="ai.js" onerror="console.log('AI module loaded')"></script>
<script>
    layui.use(['element', 'table', 'layer'], function(){
        var element = layui.element;
        var table = layui.table;
        var layer = layui.layer;
        var $ = layui.$;

        // 读取当前用户数据 (保持原逻辑)
        var user = JSON.parse(localStorage.getItem('gov_current_user') || '{}');
        var allApps = JSON.parse(localStorage.getItem('gov_applications') || '[]');

        // 过滤出当前用户的申请
        var myApps = allApps.filter(item => item.applicant === user.username);

        table.render({
            elem: '#myAppsTable',
            data: myApps,
            cols: [[
                {field: 'id', title: '流水号', width: 160, sort: true},
                {field: 'service', title: '申报事项', minWidth: 220},
                {field: 'applyTime', title: '提交时间', width: 180, sort: true},
                {field: 'status', title: '当前状态', width: 120, templet: '#statusTpl', align:'center'},
                {fixed: 'right', title: '操作', toolbar: '#barDemo', width: 180, align: 'center'}
            ]],
            page: true,
            skin: 'line',
            text: { none: '<div style="padding: 20px; color: #999;"><i class="layui-icon layui-icon-face-surprised" style="font-size: 24px; color: #ccc;"></i><div style="margin-top: 8px;">暂无办件记录，快去<a href="guide.html" style="color: var(--gov-primary);">服务指南</a>申请吧</div></div>' }
        });

        // 监听工具条 (保持原逻辑)
        table.on('tool(myAppsTable)', function(obj){
            var data = obj.data;
            if(obj.event === 'withdraw'){
                layer.confirm('确定要撤回这条申请吗？', {icon: 3, title:'提示'}, function(index){
                    // 真实删除逻辑
                    var newAllApps = allApps.filter(item => item.id !== data.id);
                    localStorage.setItem('gov_applications', JSON.stringify(newAllApps));

                    obj.del();
                    layer.close(index);
                    layer.msg('已撤回', {icon: 1});
                });
            } else if(obj.event === 'detail'){
                layer.alert(data.remarks || '暂无详细备注信息', {
                    title: '申请详情 - ' + data.service,
                    shadeClose: true
                });
            } else if(obj.event === 'evaluate'){
                layer.open({
                    type: 1,
                    title: '服务评价',
                    area: ['420px', 'auto'],
                    content: `
                        <div style="padding: 30px 20px; text-align: center;">
                            <div style="margin-bottom: 20px; font-size: 16px; font-weight: 500;">请对本次服务进行打分</div>
                            <div id="star-container" style="color: #e5e7eb; cursor: pointer; margin-bottom: 24px; display: flex; justify-content: center;">
                                <i class="layui-icon layui-icon-rate-solid eval-star" onclick="setStar(1)"></i>
                                <i class="layui-icon layui-icon-rate-solid eval-star" onclick="setStar(2)"></i>
                                <i class="layui-icon layui-icon-rate-solid eval-star" onclick="setStar(3)"></i>
                                <i class="layui-icon layui-icon-rate-solid eval-star" onclick="setStar(4)"></i>
                                <i class="layui-icon layui-icon-rate-solid eval-star" onclick="setStar(5)"></i>
                            </div>
                            <textarea id="eval-content" class="layui-textarea" placeholder="请输入您的评价内容，帮助我们改进服务..." style="min-height: 100px; margin-bottom: 20px;"></textarea>
                            <button class="layui-btn layui-btn-fluid" style="background: var(--gov-primary);" onclick="submitEval('${data.id}')">提交评价</button>
                        </div>
                    `,
                    success: function(){
                        window.currentRating = 0;
                        window.setStar = function(num) {
                            window.currentRating = num;
                            var stars = $('#star-container i');
                            stars.css('color', '#e5e7eb');
                            for(var i=0; i<num; i++) {
                                stars.eq(i).css('color', '#fa8c16');
                            }
                        }

                        window.submitEval = function(id) {
                            if(window.currentRating === 0) return layer.msg('请先点击星星打分', {icon: 0, anim: 6});

                            var content = $('#eval-content').val();

                            // 1. 更新本地存储
                            var allApps = JSON.parse(localStorage.getItem('gov_applications') || '[]');
                            var target = allApps.find(a => a.id === id);
                            if(target) {
                                target.rating = window.currentRating;
                                target.evalContent = content;
                                localStorage.setItem('gov_applications', JSON.stringify(allApps));

                                layer.closeAll();
                                layer.msg('评价成功，感谢您的反馈！', {icon: 1});

                                // 刷新表格
                                setTimeout(() => location.reload(), 800);
                            }
                        }
                    }
                });
            }
        });
    });
</script>
</body>
</html>
